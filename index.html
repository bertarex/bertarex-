<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berta Rex</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Lato', sans-serif; background: #faf9f7; color: #2c2c2a; }

    header {
      text-align: center;
      padding: 60px 20px 40px;
      border-bottom: 1px solid #e8e4de;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #2c2c2a;
    }
    header p {
      margin-top: 10px;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      font-weight: 300;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    nav a { color: #2c2c2a; text-decoration: none; }
    nav a:hover { color: #b5a898; }

    .container { max-width: 780px; margin: 0 auto; padding: 60px 20px; }

    .post {
      margin-bottom: 70px;
      padding-bottom: 70px;
      border-bottom: 1px solid #e8e4de;
    }
    .post:last-child { border-bottom: none; }

    .post-meta {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #b5a898;
      margin-bottom: 14px;
    }
    .post h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 400;
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .post h2 a { color: #2c2c2a; text-decoration: none; }
    .post h2 a:hover { color: #b5a898; }
    .post p { font-size: 1rem; line-height: 1.8; color: #555; margin-bottom: 16px; }
    .post img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      margin-bottom: 24px;
      filter: brightness(0.97);
    }
    .read-more {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #2c2c2a;
      text-decoration: none;
      border-bottom: 1px solid #2c2c2a;
      padding-bottom: 2px;
    }
    .read-more:hover { color: #b5a898; border-color: #b5a898; }

    footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid #e8e4de;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>Berta Rex</h1>
  <p>moda &middot; vida &middot; estilo</p>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="sobre-mi.html">Sobre mí</a>
  </nav>
</header>

<div class="container">

  <!-- ARTÍCULO 1 — el más reciente arriba -->
  <article class="post">
    <p class="post-meta">12 de junio de 2026 &nbsp;&middot;&nbsp; Moda</p>
    <h2><a href="post1.html">Mi look favorito este verano</a></h2>
    <!-- Para añadir foto: sube la imagen al repositorio y pon el nombre aquí -->
    <!-- <img src="foto1.jpg" alt="Look verano"> -->
    <p>Escribe aquí la introducción de tu primer artículo. Puedes contar lo que quieras — un outfit, un viaje, una rutina. Este es tu espacio.</p>
    <a href="post1.html" class="read-more">Leer más</a>
  </article>

</div>

<footer>
  © 2026 Berta Rex
</footer>

</body>
</html>
